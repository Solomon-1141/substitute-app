<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>[DEMO] ระบบจัดสอนแทน — MKP</title>
<style>
:root {
  --blue: #2b6cb0; --blue-light: #ebf8ff; --blue-dark: #1e4e8c;
  --green: #276749; --green-light: #f0fff4; --green-mid: #38a169;
  --red: #c53030; --red-light: #fff5f5;
  --gray: #718096; --border: #e2e8f0; --bg: #f0f4f8;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); color: #1a202c; min-height: 100vh; }

.demo-bar {
  background: #dd6b20; color: white; text-align: center;
  padding: 7px 16px; font-size: 0.78rem; font-weight: 700; letter-spacing: 0.03em;
}

header {
  background: linear-gradient(135deg, var(--blue-dark), var(--blue));
  color: white; padding: 14px 16px; position: sticky; top: 0; z-index: 50;
  box-shadow: 0 2px 8px rgba(0,0,0,0.25);
}
header h1 { font-size: 1rem; font-weight: 700; }
header p  { font-size: 0.72rem; opacity: 0.8; margin-top: 2px; }

.tabs { display: flex; background: white; border-bottom: 2px solid var(--border); }
.tab-btn {
  flex: 1; padding: 11px; border: none; background: none; cursor: pointer;
  font-size: 0.82rem; font-weight: 600; color: var(--gray);
  border-bottom: 3px solid transparent; margin-bottom: -2px; transition: all 0.15s;
}
.tab-btn.active { color: var(--blue); border-bottom-color: var(--blue); }

.tab-pane { display: none; padding: 14px; max-width: 600px; margin: 0 auto; }
.tab-pane.active { display: block; }

.card {
  background: white; border-radius: 12px; padding: 16px;
  box-shadow: 0 1px 4px rgba(0,0,0,0.08); margin-bottom: 14px;
}
.card-title { font-size: 0.78rem; font-weight: 700; color: var(--gray); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 12px; }

label { display: block; font-size: 0.75rem; font-weight: 600; color: #4a5568; margin-bottom: 5px; }
select, input[type=date] {
  width: 100%; border: 1.5px solid var(--border); border-radius: 8px;
  padding: 9px 10px; font-size: 0.85rem; color: #1a202c;
  background: white; outline: none; margin-bottom: 12px;
  transition: border-color 0.15s; appearance: none;
}
select:focus, input[type=date]:focus { border-color: var(--blue); }
select:last-child, input:last-child { margin-bottom: 0; }

.period-card {
  background: white; border-radius: 10px; padding: 14px;
  box-shadow: 0 1px 4px rgba(0,0,0,0.08); margin-bottom: 10px;
  border-left: 4px solid var(--blue);
}
.period-card.assigned { border-left-color: var(--green-mid); }
.period-header { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
.period-badge {
  background: var(--blue); color: white; border-radius: 8px;
  padding: 4px 10px; font-size: 0.75rem; font-weight: 700; white-space: nowrap;
}
.period-badge.double { background: #6b46c1; }
.period-info { flex: 1; }
.period-class { font-weight: 700; font-size: 0.9rem; }
.period-subj { font-size: 0.75rem; color: var(--gray); }
.period-time { font-size: 0.72rem; color: var(--blue); font-weight: 600; margin-top: 1px; }
.room-tag { background: #f7fafc; border: 1px solid var(--border); border-radius: 6px; padding: 2px 7px; font-size: 0.7rem; color: var(--gray); }
.sub-label { font-size: 0.72rem; font-weight: 700; color: var(--gray); margin-bottom: 5px; display: block; }
.sub-select {
  width: 100%; border: 1.5px solid var(--border); border-radius: 8px;
  padding: 8px 10px; font-size: 0.82rem; color: #1a202c;
  background: white; outline: none; transition: border-color 0.15s;
}
.sub-select:focus { border-color: var(--green-mid); }
.sub-select.selected { border-color: var(--green-mid); background: var(--green-light); }
.free-count { font-size: 0.7rem; color: var(--green); margin-top: 4px; }

.btn-submit {
  width: 100%; padding: 14px; border-radius: 10px; border: none;
  background: var(--blue); color: white; font-size: 0.9rem; font-weight: 700;
  cursor: pointer; transition: background 0.15s; margin-top: 4px;
}
.btn-submit:hover { background: var(--blue-dark); }
.btn-submit:disabled { background: #a0aec0; cursor: not-allowed; }

.empty-msg { text-align: center; padding: 32px 16px; color: var(--gray); }
.empty-msg .icon { font-size: 2.5rem; margin-bottom: 8px; }
.empty-msg p { font-size: 0.85rem; }

.btn-refresh {
  border: 1.5px solid var(--border); border-radius: 8px; background: white;
  padding: 6px 12px; font-size: 0.75rem; cursor: pointer; color: var(--gray);
}
.btn-refresh:hover { border-color: var(--blue); color: var(--blue); }

.spinner { display: inline-block; width: 18px; height: 18px; border: 2px solid #bee3f8; border-top-color: var(--blue); border-radius: 50%; animation: spin 0.6s linear infinite; vertical-align: middle; margin-right: 6px; }
@keyframes spin { to { transform: rotate(360deg); } }

.toast {
  position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(10px);
  background: #1a202c; color: white; border-radius: 10px; padding: 10px 20px;
  font-size: 0.82rem; font-weight: 600; opacity: 0; transition: all 0.25s;
  pointer-events: none; z-index: 100; white-space: nowrap;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
.toast.green { background: var(--green); }
.toast.red { background: var(--red); }
.toast.orange { background: #dd6b20; }

/* Records tab */
.rec-toolbar { display: flex; align-items: center; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; }
.rec-toolbar h3 { font-size: 0.9rem; font-weight: 700; flex: 1; }
.btn-line {
  background: #06c755; color: white; border: none; border-radius: 8px;
  padding: 7px 13px; font-size: 0.78rem; font-weight: 700; cursor: pointer; white-space: nowrap;
}
.btn-line:hover { background: #05a847; }
.btn-line:active { transform: scale(0.97); }

.summary-table { width: 100%; border-collapse: collapse; background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
.summary-table th {
  background: var(--blue-dark); color: white; font-size: 0.72rem; font-weight: 700;
  padding: 9px 10px; text-align: left;
}
.summary-table td { padding: 10px; font-size: 0.8rem; border-bottom: 1px solid var(--border); vertical-align: top; }
.summary-table tr:last-child td { border-bottom: none; }
.summary-table tr:hover td { background: var(--blue-light); }
.td-period { font-weight: 700; color: white; background: var(--blue) !important; text-align: center; white-space: nowrap; width: 52px; }
.td-period.double { background: #6b46c1 !important; }
.td-time { color: var(--gray); font-size: 0.72rem; white-space: nowrap; }
.td-arrow { font-size: 0.75rem; color: var(--gray); }
.td-absent { color: #744210; font-weight: 600; }
.td-sub { color: var(--green); font-weight: 700; font-size: 0.88rem; }
.td-cls { color: var(--gray); font-size: 0.72rem; }
.del-btn-wrap { text-align: center; width: 30px; }
.btn-del-rec { border: none; background: none; cursor: pointer; color: #fc8181; font-size: 1rem; padding: 4px; border-radius: 6px; }
.btn-del-rec:hover { background: var(--red-light); }

/* Timetable tab */
.day-selector { display: flex; gap: 6px; margin-bottom: 14px; }
.day-btn {
  flex: 1; padding: 9px 4px; border: 1.5px solid var(--border); border-radius: 8px;
  background: white; font-size: 0.8rem; font-weight: 700; cursor: pointer; color: var(--gray);
  text-align: center; transition: all 0.15s;
}
.day-btn.active { background: var(--blue); color: white; border-color: var(--blue); }
.timetable-wrap { overflow-x: auto; border-radius: 12px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
.tt { border-collapse: collapse; width: 100%; min-width: 520px; font-size: 0.72rem; }
.tt th {
  background: var(--blue-dark); color: white; padding: 7px 5px; text-align: center;
  font-size: 0.68rem; white-space: nowrap; font-weight: 700;
}
.tt th .tt-time { font-weight: 400; font-size: 0.6rem; opacity: 0.8; display: block; }
.tt td { padding: 6px 5px; border: 1px solid var(--border); text-align: center; vertical-align: middle; background: white; }
.tt .td-name { text-align: left; font-weight: 700; font-size: 0.76rem; background: #f7fafc; padding: 6px 10px; white-space: nowrap; border-right: 2px solid var(--border); }
.cell-free { color: #c6f6d5; font-size: 0.6rem; background: #f0fff4 !important; }
.cell-busy { background: var(--blue-light) !important; }
.cell-double { background: #f0e6ff !important; }
.cell-cls { font-weight: 700; color: #1e4e8c; }
.cell-double .cell-cls { color: #6b46c1; }
.cell-subj { color: var(--gray); font-size: 0.6rem; margin-top: 1px; }
</style>
</head>
<body>

<div class="demo-bar">⚡ DEMO MODE — ข้อมูลตัวอย่าง ไม่ได้เชื่อมฐานข้อมูลจริง</div>

<header>
  <h1>ระบบจัดสอนแทน — โรงเรียนเมืองแกพิทยาสรรค์</h1>
  <p>ภาคเรียนที่ 1/2569</p>
</header>

<div class="tabs">
  <button class="tab-btn active" onclick="switchTab('assign')">จัดสอนแทน</button>
  <button class="tab-btn" onclick="switchTab('records')">บันทึกวันนี้</button>
  <button class="tab-btn" onclick="switchTab('timetable')">ตารางสอน</button>
</div>

<!-- Tab 1: Assign -->
<div class="tab-pane active" id="tab-assign">
  <div class="card">
    <div class="card-title">เลือกครูที่ลา</div>
    <label>วันที่</label>
    <input type="date" id="date-input" onchange="onDateChange()">
    <label>ครูที่ลา</label>
    <select id="teacher-select" onchange="onTeacherChange()">
      <option value="">— เลือกครู —</option>
    </select>
    <label>ฉันคือ</label>
    <select id="user-select">
      <option value="ครูภูริณัฐ">ครูภูริณัฐ</option>
      <option value="ครูพงศธร">ครูพงศธร</option>
    </select>
  </div>
  <div id="periods-container"></div>
  <button class="btn-submit" id="submit-btn" onclick="submitAll()" style="display:none">
    บันทึกการจัดสอนแทน
  </button>
</div>

<!-- Tab 2: Records -->
<div class="tab-pane" id="tab-records">
  <div class="rec-toolbar">
    <h3 id="rec-title">รายการวันนี้</h3>
    <button class="btn-line" id="btn-copy-line" onclick="copyForLine()" style="display:none">📋 คัดลอกสำหรับ LINE</button>
    <button class="btn-refresh" onclick="loadRecords()">↻ รีเฟรช</button>
  </div>
  <div id="records-list">
    <div style="text-align:center;padding:20px"><span class="spinner"></span>กำลังโหลด...</div>
  </div>
</div>

<!-- Tab 3: Timetable -->
<div class="tab-pane" id="tab-timetable">
  <div class="day-selector" id="day-selector"></div>
  <div class="timetable-wrap">
    <table class="tt" id="tt-grid">
      <tr><td colspan="8" style="text-align:center;padding:24px;color:var(--gray)">กำลังโหลด...</td></tr>
    </table>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const DAYS_TH = ['อาทิตย์','จันทร์','อังคาร','พุธ','พฤหัส','ศุกร์','เสาร์'];

let TEACHERS = [];
let currentDate = '';
let currentDay  = '';

// ── Mock records (ข้อมูลตัวอย่าง) ──────────────────────
const MOCK_RECORDS = [
  {
    rowIndex: 2, date: '2026-05-18',
    absentTeacher: 'นายภูริณัฐ กลั่นกำเนิด', period: '1+2',
    time: '08:30-10:30', cls: 'ม.6', subject: 'ค33103', room: '323',
    substitute: 'นายพงศธร สายสุวรรณ', recordedBy: 'ครูภูริณัฐ', timestamp: '18/05/2026 08:30'
  },
  {
    rowIndex: 3, date: '2026-05-18',
    absentTeacher: 'นายภูริณัฐ กลั่นกำเนิด', period: '3',
    time: '10:30-11:30', cls: 'ม.4', subject: 'ค31201', room: '328',
    substitute: 'นางสาวสุภาพร มีมงคล', recordedBy: 'ครูภูริณัฐ', timestamp: '18/05/2026 08:30'
  },
  {
    rowIndex: 4, date: '2026-05-18',
    absentTeacher: 'นายสมพงษ์ ทองอ่อน', period: '5',
    time: '13:30-14:30', cls: 'ม.2/3', subject: 'สุขศึกษา', room: '201',
    substitute: 'นายประทีป รักษ์ไพร', recordedBy: 'ครูพงศธร', timestamp: '18/05/2026 12:15'
  },
];

let _mockRecords = [...MOCK_RECORDS];
let _lastRecords = [];

// ── Init ──────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', async () => {
  const today = new Date();
  const pad = n => String(n).padStart(2,'0');
  currentDate = `${today.getFullYear()}-${pad(today.getMonth()+1)}-${pad(today.getDate())}`;
  document.getElementById('date-input').value = currentDate;
  currentDay = DAYS_TH[today.getDay()];

  try {
    const res = await fetch('./teachers.json');
    TEACHERS = await res.json();
    populateTeacherSelect();
    initTimetable();
  } catch(e) {
    showToast('โหลด teachers.json ไม่ได้', 'red');
  }

  // Auto-load mock records
  loadRecords();
});

function onDateChange() {
  currentDate = document.getElementById('date-input').value;
  const d = new Date(currentDate + 'T12:00:00');
  currentDay = DAYS_TH[d.getDay()];
  onTeacherChange();
}

function populateTeacherSelect() {
  const sel = document.getElementById('teacher-select');
  TEACHERS.filter(t => Object.keys(t.schedule).length > 0).forEach(t => {
    const opt = document.createElement('option');
    opt.value = t.name;
    opt.textContent = t.name.replace(/^(นาย|นางสาว|นาง)\s*/,'');
    sel.appendChild(opt);
  });
}

function onTeacherChange() {
  const name = document.getElementById('teacher-select').value;
  const container = document.getElementById('periods-container');
  const submitBtn = document.getElementById('submit-btn');

  if (!name) { container.innerHTML = ''; submitBtn.style.display = 'none'; return; }

  const teacher = TEACHERS.find(t => t.name === name);
  const daySchedule = teacher?.schedule?.[currentDay] || [];

  const seen = new Set();
  const uniquePeriods = [];
  for (const p of daySchedule) {
    const key = p.isDouble ? p.time + p.class : `p${p.period}`;
    if (!seen.has(key)) { seen.add(key); uniquePeriods.push(p); }
  }

  if (uniquePeriods.length === 0) {
    const dayLabel = ['','วันจันทร์','วันอังคาร','วันพุธ','วันพฤหัสบดี','วันศุกร์','',''][new Date(currentDate+'T12:00:00').getDay()];
    container.innerHTML = `<div class="empty-msg"><div class="icon">✅</div><p>${name.replace(/^(นาย|นางสาว|นาง)\s*/,'')}<br>ไม่มีคาบเรียน${dayLabel||'วันนี้'}</p></div>`;
    submitBtn.style.display = 'none';
    return;
  }

  container.innerHTML = '';
  uniquePeriods.forEach(p => renderPeriodCard(container, p, name));
  submitBtn.style.display = 'block';
}

function renderPeriodCard(container, p, absentName) {
  const available = getAvailableTeachers(currentDay, p.period, absentName);
  const isDouble = p.isDouble;
  const periodLabel = isDouble ? `คาบ ${getPairNums(p)} [คาบคู่]` : `คาบ ${p.period}`;

  const card = document.createElement('div');
  card.className = 'period-card';
  card.id = `card-p${p.period}`;
  card.innerHTML = `
    <div class="period-header">
      <span class="period-badge ${isDouble?'double':''}">${periodLabel}</span>
      <div class="period-info">
        <div class="period-class">${p.class}</div>
        <div class="period-subj">${p.subject}</div>
        <div class="period-time">🕐 ${p.time}</div>
      </div>
      <span class="room-tag">ห้อง ${p.room}</span>
    </div>
    <span class="sub-label">ครูสอนแทน</span>
    <select class="sub-select" id="sub-${p.period}" onchange="onSubChange(this, ${p.period})">
      <option value="">— เลือกครูสอนแทน (${available.length} คนว่าง) —</option>
      ${available.map(n => `<option value="${n}">${n.replace(/^(นาย|นางสาว|นาง)\s*/,'')}</option>`).join('')}
      <optgroup label="────────────────────"></optgroup>
      <option value="__all__">แสดงครูทั้งหมด...</option>
    </select>
    <div class="free-count" id="note-${p.period}"></div>
  `;
  container.appendChild(card);
}

function onSubChange(sel, period) {
  if (sel.value === '__all__') {
    const absentName = document.getElementById('teacher-select').value;
    const allTeachers = TEACHERS.filter(t => Object.keys(t.schedule).length > 0 && t.name !== absentName);
    const available = getAvailableTeachers(currentDay, period, absentName);
    const busy = allTeachers.filter(t => !available.includes(t.name));
    sel.innerHTML = `<option value="">— เลือกครูสอนแทน —</option>
      <optgroup label="ว่าง (${available.length} คน)">
        ${available.map(n => `<option value="${n}">${n.replace(/^(นาย|นางสาว|นาง)\s*/,'')}</option>`).join('')}
      </optgroup>
      <optgroup label="มีคาบอยู่ (${busy.length} คน) — เลือกได้ถ้าจำเป็น">
        ${busy.map(t => `<option value="${t.name}">${t.name.replace(/^(นาย|นางสาว|นาง)\s*/,'')}</option>`).join('')}
      </optgroup>`;
    sel.value = '';
  }
  const card = sel.closest('.period-card');
  if (sel.value && sel.value !== '__all__') {
    card.classList.add('assigned');
    document.getElementById(`note-${period}`).textContent = `✓ ${sel.value.replace(/^(นาย|นางสาว|นาง)\s*/,'')} รับหน้าที่แทน`;
  } else {
    card.classList.remove('assigned');
    document.getElementById(`note-${period}`).textContent = '';
  }
}

function getAvailableTeachers(day, period, excludeName) {
  const busyNames = new Set();
  TEACHERS.forEach(t => {
    const dayS = t.schedule[day] || [];
    if (dayS.some(p => p.period === period)) busyNames.add(t.name);
  });
  return TEACHERS
    .filter(t => Object.keys(t.schedule).length > 0 && t.name !== excludeName && !busyNames.has(t.name))
    .map(t => t.name);
}

function getPairNums(p) {
  if (!p.isDouble) return String(p.period);
  const absent = TEACHERS.find(t => t.name === document.getElementById('teacher-select').value);
  const pairs = (absent?.schedule?.[currentDay] || []).filter(x => x.isDouble && x.time === p.time).map(x => x.period);
  return pairs.length > 1 ? `${Math.min(...pairs)}+${Math.max(...pairs)}` : String(p.period);
}

// ── Demo: Submit (ไม่บันทึกจริง) ──────────────────────
async function submitAll() {
  const toSave = [];
  const teacher = TEACHERS.find(t => t.name === document.getElementById('teacher-select').value);
  const daySchedule = teacher?.schedule?.[currentDay] || [];
  const seen = new Set();
  for (const p of daySchedule) {
    const key = p.isDouble ? p.time + p.class : `p${p.period}`;
    if (seen.has(key)) continue;
    seen.add(key);
    const sub = document.getElementById(`sub-${p.period}`)?.value;
    if (sub && sub !== '__all__') toSave.push(sub);
  }
  if (!toSave.length) { showToast('กรุณาเลือกครูสอนแทนอย่างน้อย 1 คาบ', 'red'); return; }

  showToast('DEMO — บันทึกสำเร็จ ✓ (ไม่ได้บันทึกจริง)', 'orange');
  setTimeout(() => {
    document.getElementById('teacher-select').value = '';
    document.getElementById('periods-container').innerHTML = '';
    document.getElementById('submit-btn').style.display = 'none';
  }, 1200);
}

// ── Demo: Load records (ใช้ข้อมูลสมมุติ) ──────────────
function loadRecords() {
  const months = ['','ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
  const [y,m,d] = currentDate.split('-');
  document.getElementById('rec-title').textContent =
    `รายการ ${parseInt(d)} ${months[parseInt(m)]} ${parseInt(y)+543} [DEMO]`;
  renderRecords(_mockRecords);
}

function shortName(n) { return (n||'').replace(/^(นาย|นางสาว|นาง)\s*/,''); }

function renderRecords(records) {
  _lastRecords = records;
  const list = document.getElementById('records-list');
  const copyBtn = document.getElementById('btn-copy-line');

  if (!records.length) {
    list.innerHTML = '<div class="empty-msg"><div class="icon">📋</div><p>ยังไม่มีรายการวันนี้</p></div>';
    copyBtn.style.display = 'none';
    return;
  }
  copyBtn.style.display = '';

  const rows = records.map(r => {
    const isDouble = r.period.includes('+');
    return `<tr>
      <td class="td-period${isDouble?' double':''}">คาบ<br>${r.period}</td>
      <td>
        <div class="td-time">${r.time}</div>
        <div class="td-cls">${r.cls} · ${r.subject} · ห้อง ${r.room}</div>
      </td>
      <td>
        <div class="td-absent">⬆ ${shortName(r.absentTeacher)} ลา</div>
        <div class="td-arrow">↓</div>
        <div class="td-sub">${shortName(r.substitute)} สอนแทน</div>
      </td>
      <td class="del-btn-wrap">
        <button class="btn-del-rec" onclick="demoDelete(${r.rowIndex})" title="ลบ">✕</button>
      </td>
    </tr>`;
  }).join('');

  list.innerHTML = `
    <table class="summary-table">
      <thead><tr>
        <th>คาบ</th><th>เวลา / ชั้น</th><th>ครูที่ลา → สอนแทน</th><th></th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>`;
}

function demoDelete(rowIndex) {
  _mockRecords = _mockRecords.filter(r => r.rowIndex !== rowIndex);
  renderRecords(_mockRecords);
  showToast('ลบแล้ว [DEMO]', 'green');
}

function copyForLine() {
  if (!_lastRecords.length) return;
  const dateObj = new Date(currentDate + 'T00:00:00');
  const dayTh = DAYS_TH[dateObj.getDay()];
  const months = ['','ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
  const [y,m,d] = currentDate.split('-');
  const dateStr = `วัน${dayTh}ที่ ${parseInt(d)} ${months[parseInt(m)]} ${parseInt(y)+543}`;
  const lines = [
    `📋 จัดสอนแทน ${dateStr}`,
    `โรงเรียนเมืองแกพิทยาสรรค์`,
    `───────────────────`,
    ..._lastRecords.map(r =>
      `คาบ ${r.period} (${r.time})\n${shortName(r.absentTeacher)} ลา → ${shortName(r.substitute)} สอนแทน\n${r.cls} · ${r.subject} · ห้อง ${r.room}`
    )
  ];
  navigator.clipboard.writeText(lines.join('\n\n'))
    .then(() => showToast('คัดลอกแล้ว ✓ วางใน LINE ได้เลย', 'green'))
    .catch(() => showToast('คัดลอกไม่สำเร็จ', 'red'));
}

// ── Timetable ─────────────────────────────────────────
const TT_DAYS = ['จันทร์','อังคาร','พุธ','พฤหัส','ศุกร์'];
const TT_PERIODS = [
  {p:1,time:'08:30'},{p:2,time:'09:30'},{p:3,time:'10:30'},
  {p:4,time:'12:30'},{p:5,time:'13:30'},{p:6,time:'14:30'},{p:7,time:'15:30'}
];
let _ttDay = '';

function initTimetable() {
  _ttDay = currentDay && TT_DAYS.includes(currentDay) ? currentDay : 'จันทร์';
  const sel = document.getElementById('day-selector');
  TT_DAYS.forEach(d => {
    const btn = document.createElement('button');
    btn.className = 'day-btn' + (d === _ttDay ? ' active' : '');
    btn.textContent = d;
    btn.onclick = () => {
      _ttDay = d;
      document.querySelectorAll('.day-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderTimetable();
    };
    sel.appendChild(btn);
  });
}

function renderTimetable() {
  if (!TEACHERS.length) return;
  const grid = document.getElementById('tt-grid');
  const header = `<tr>
    <th style="text-align:left;padding-left:10px">ครู</th>
    ${TT_PERIODS.map(pi => `<th>คาบ ${pi.p}<span class="tt-time">${pi.time}</span></th>`).join('')}
  </tr>`;

  const rows = TEACHERS.filter(t => Object.keys(t.schedule).length > 0).map(t => {
    const sched = t.schedule[_ttDay] || [];
    const cells = TT_PERIODS.map(pi => {
      const e = sched.find(x => x.period === pi.p);
      if (!e) return `<td class="cell-free">ว่าง</td>`;
      return `<td class="cell-busy${e.isDouble?' cell-double':''}">
        <div class="cell-cls">${e.class}</div>
        <div class="cell-subj">${e.subject}</div>
      </td>`;
    }).join('');
    const sn = t.name.replace(/^(นาย|นางสาว|นาง)\s*/,'').split(' ')[0];
    return `<tr><td class="td-name">${sn}</td>${cells}</tr>`;
  }).join('');

  grid.innerHTML = header + rows;
}

// ── UI helpers ────────────────────────────────────────
function switchTab(tab) {
  const map = ['assign','records','timetable'];
  document.querySelectorAll('.tab-btn').forEach((b,i) => b.classList.toggle('active', map[i] === tab));
  document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
  document.getElementById(`tab-${tab}`).classList.add('active');
  if (tab === 'timetable') renderTimetable();
}

function showToast(msg, type='') {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = 'toast show ' + type;
  setTimeout(() => t.className = 'toast', 2800);
}
</script>

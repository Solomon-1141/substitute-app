<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ระบบจัดสอนแทน — MKP</title>
<style>
:root {
  --blue: #2b6cb0; --blue-lt: #ebf8ff; --blue-dk: #1e4e8c;
  --green: #276749; --green-lt: #f0fff4; --green-md: #38a169;
  --red: #c53030; --red-lt: #fff5f5;
  --gray: #718096; --border: #e2e8f0; --bg: #f0f4f8;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); color: #1a202c; min-height: 100vh; }

/* Header */
header {
  background: linear-gradient(135deg, var(--blue-dk), var(--blue));
  color: #fff; padding: 14px 16px; position: sticky; top: 0; z-index: 50;
  box-shadow: 0 2px 8px rgba(0,0,0,.25);
}
header h1 { font-size: 1rem; font-weight: 700; }
header p  { font-size: .72rem; opacity: .8; margin-top: 2px; }

/* Tabs */
.tabs { display: flex; background: #fff; border-bottom: 2px solid var(--border); }
.tab-btn {
  flex: 1; padding: 11px; border: none; background: none; cursor: pointer;
  font-size: .82rem; font-weight: 600; color: var(--gray);
  border-bottom: 3px solid transparent; margin-bottom: -2px; transition: all .15s;
}
.tab-btn.active { color: var(--blue); border-bottom-color: var(--blue); }

/* Pane */
.tab-pane { display: none; padding: 14px; max-width: 600px; margin: 0 auto; }
.tab-pane.active { display: block; }

/* Card */
.card { background: #fff; border-radius: 12px; padding: 16px; box-shadow: 0 1px 4px rgba(0,0,0,.08); margin-bottom: 14px; }
.card-title { font-size: .78rem; font-weight: 700; color: var(--gray); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 12px; }

/* Form */
.field-label { display: block; font-size: .75rem; font-weight: 600; color: #4a5568; margin-bottom: 5px; }
input[type=date], select {
  width: 100%; border: 1.5px solid var(--border); border-radius: 8px;
  padding: 9px 10px; font-size: .85rem; color: #1a202c;
  background: #fff; outline: none; margin-bottom: 12px;
  transition: border-color .15s; appearance: none;
}
input[type=date]:focus, select:focus { border-color: var(--blue); }

/* Teacher checklist */
#teacher-checklist {
  max-height: 220px; overflow-y: auto;
  border: 1.5px solid var(--border); border-radius: 8px;
  padding: 4px; background: #fff; margin-bottom: 6px;
}
#teacher-checklist label {
  display: flex; align-items: center; gap: 8px;
  padding: 7px 8px; cursor: pointer; border-radius: 6px;
  font-size: .82rem; color: #1a202c; margin-bottom: 0; transition: background .1s;
}
#teacher-checklist label:hover { background: var(--blue-lt); }
#teacher-checklist input[type=checkbox] { width: 17px; height: 17px; cursor: pointer; accent-color: var(--blue); flex-shrink: 0; }
#teacher-checklist label.selected { background: var(--blue-lt); font-weight: 600; color: var(--blue); }
#selected-summary { font-size: .75rem; color: var(--gray); margin-bottom: 12px; min-height: 1.1em; }

/* Group header */
.group-hdr {
  background: var(--blue); color: #fff;
  padding: 7px 12px; border-radius: 8px;
  margin: 12px 0 6px; font-size: .82rem; font-weight: 700;
}

/* Period card */
.period-card {
  background: #fff; border-radius: 10px; padding: 14px;
  box-shadow: 0 1px 4px rgba(0,0,0,.08); margin-bottom: 10px;
  border-left: 4px solid var(--blue); transition: border-color .2s;
}
.period-card.assigned { border-left-color: var(--green-md); }
.p-header { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
.p-badge {
  background: var(--blue); color: #fff; border-radius: 8px;
  padding: 4px 10px; font-size: .75rem; font-weight: 700; white-space: nowrap;
}
.p-badge.double { background: #6b46c1; }
.p-info { flex: 1; }
.p-class { font-weight: 700; font-size: .9rem; }
.p-subj  { font-size: .75rem; color: var(--gray); }
.p-time  { font-size: .72rem; color: var(--blue); font-weight: 600; margin-top: 1px; }
.p-room  { background: #f7fafc; border: 1px solid var(--border); border-radius: 6px; padding: 2px 7px; font-size: .7rem; color: var(--gray); }

.sub-lbl { font-size: .72rem; font-weight: 700; color: var(--gray); margin-bottom: 5px; display: block; }
.sub-sel {
  width: 100%; border: 1.5px solid var(--border); border-radius: 8px;
  padding: 8px 10px; font-size: .82rem; color: #1a202c;
  background: #fff; outline: none; transition: border-color .15s;
}
.sub-sel:focus { border-color: var(--green-md); }
.sub-sel.done { border-color: var(--green-md); background: var(--green-lt); }
.sub-note { font-size: .7rem; color: var(--green); margin-top: 4px; }

/* Submit */
.btn-submit {
  width: 100%; padding: 14px; border-radius: 10px; border: none;
  background: var(--blue); color: #fff; font-size: .9rem; font-weight: 700;
  cursor: pointer; transition: background .15s; margin-top: 4px;
}
.btn-submit:hover { background: var(--blue-dk); }
.btn-submit:disabled { background: #a0aec0; cursor: not-allowed; }

/* Empty */
.empty-msg { text-align: center; padding: 32px 16px; color: var(--gray); }
.empty-msg .icon { font-size: 2.5rem; margin-bottom: 8px; }
.empty-msg p { font-size: .85rem; }

/* Records */
.rec-toolbar { display: flex; align-items: center; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; }
.rec-toolbar h3 { font-size: .9rem; font-weight: 700; flex: 1; }
.btn-line {
  background: #06c755; color: #fff; border: none; border-radius: 8px;
  padding: 7px 13px; font-size: .78rem; font-weight: 700; cursor: pointer; white-space: nowrap;
}
.btn-line:hover { background: #05a847; }
.btn-refresh {
  border: 1.5px solid var(--border); border-radius: 8px; background: #fff;
  padding: 6px 12px; font-size: .75rem; cursor: pointer; color: var(--gray);
}
.btn-refresh:hover { border-color: var(--blue); color: var(--blue); }

/* Summary table */
.sum-table { width: 100%; border-collapse: collapse; background: #fff; border-radius: 12px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,.08); }
.sum-table th { background: var(--blue-dk); color: #fff; font-size: .72rem; font-weight: 700; padding: 9px 10px; text-align: left; }
.sum-table td { padding: 10px; font-size: .8rem; border-bottom: 1px solid var(--border); vertical-align: top; }
.sum-table tr:last-child td { border-bottom: none; }
.sum-table tr:hover td { background: var(--blue-lt); }
.td-period { font-weight: 700; color: #fff; background: var(--blue) !important; text-align: center; white-space: nowrap; width: 52px; }
.td-period.double { background: #6b46c1 !important; }
.td-time  { color: var(--gray); font-size: .72rem; white-space: nowrap; }
.td-absent { color: #744210; font-weight: 600; }
.td-sub   { color: var(--green); font-weight: 700; font-size: .88rem; }
.td-cls   { color: var(--gray); font-size: .72rem; }
.del-wrap { text-align: center; width: 30px; }
.btn-del  { border: none; background: none; cursor: pointer; color: #fc8181; font-size: 1rem; padding: 4px; border-radius: 6px; }
.btn-del:hover { background: var(--red-lt); }

/* Spinner / Toast */
.spinner { display: inline-block; width: 18px; height: 18px; border: 2px solid #bee3f8; border-top-color: var(--blue); border-radius: 50%; animation: spin .6s linear infinite; vertical-align: middle; margin-right: 6px; }
@keyframes spin { to { transform: rotate(360deg); } }
.toast {
  position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(10px);
  background: #1a202c; color: #fff; border-radius: 10px; padding: 10px 20px;
  font-size: .82rem; font-weight: 600; opacity: 0; transition: all .25s;
  pointer-events: none; z-index: 100; white-space: nowrap;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
.toast.green { background: var(--green); }
.toast.red   { background: var(--red); }

/* Timetable */
.day-sel { display: flex; gap: 6px; margin-bottom: 14px; }
.day-btn {
  flex: 1; padding: 9px 4px; border: 1.5px solid var(--border); border-radius: 8px;
  background: #fff; font-size: .8rem; font-weight: 700; cursor: pointer; color: var(--gray);
  text-align: center; transition: all .15s;
}
.day-btn.active { background: var(--blue); color: #fff; border-color: var(--blue); }
.tt-wrap { overflow-x: auto; border-radius: 12px; box-shadow: 0 1px 4px rgba(0,0,0,.08); }
.tt { border-collapse: collapse; width: 100%; min-width: 520px; font-size: .72rem; }
.tt th { background: var(--blue-dk); color: #fff; padding: 7px 5px; text-align: center; font-size: .68rem; white-space: nowrap; font-weight: 700; }
.tt th .tt-t { font-weight: 400; font-size: .6rem; opacity: .8; display: block; }
.tt td { padding: 6px 5px; border: 1px solid var(--border); text-align: center; vertical-align: middle; background: #fff; }
.tt .td-n { text-align: left; font-weight: 700; font-size: .76rem; background: #f7fafc; padding: 6px 10px; white-space: nowrap; border-right: 2px solid var(--border); }
.c-free   { color: #c6f6d5; font-size: .6rem; background: #f0fff4 !important; }
.c-busy   { background: var(--blue-lt) !important; }
.c-double { background: #f0e6ff !important; }
.c-cls  { font-weight: 700; color: #1e4e8c; }
.c-double .c-cls { color: #6b46c1; }
.c-subj { color: var(--gray); font-size: .6rem; margin-top: 1px; }

/* Summary view */
.sum-group { background:#fff; border-radius:12px; margin-bottom:10px; overflow:hidden; box-shadow:0 1px 4px rgba(0,0,0,.08); }
.sum-group-hdr { background:var(--blue); color:#fff; padding:9px 14px; font-size:.82rem; font-weight:700; }
.sum-row { display:flex; align-items:center; gap:10px; padding:10px 14px; border-bottom:1px solid var(--border); }
.sum-row:last-child { border-bottom:none; }
.sum-period { background:var(--blue); color:#fff; border-radius:8px; padding:4px 10px; font-size:.75rem; font-weight:700; white-space:nowrap; min-width:52px; text-align:center; }
.sum-period.double { background:#6b46c1; }
.sum-mid { flex:1; }
.sum-time  { font-size:.72rem; color:var(--blue); font-weight:600; }
.sum-cls   { font-size:.85rem; font-weight:700; }
.sum-subj  { font-size:.72rem; color:var(--gray); }
.sum-arrow { font-size:.7rem; color:var(--gray); white-space:nowrap; }
.sum-sub   { font-size:.85rem; font-weight:700; color:var(--green); white-space:nowrap; text-align:right; max-width:140px; line-height:1.3; }

/* Config alert */
.cfg-alert { background: #fffbeb; border: 1.5px solid #f6e05e; border-radius: 10px; padding: 12px 14px; margin-bottom: 14px; font-size: .78rem; color: #744210; }
.cfg-alert strong { display: block; margin-bottom: 4px; }
</style>
</head>

<header>
  <h1>ระบบจัดสอนแทน — โรงเรียนเมืองแกพิทยาสรรค์</h1>
  <p>ภาคเรียนที่ 1/2569</p>
</header>

<div class="tabs">
  <button class="tab-btn active" onclick="switchTab('assign')">จัดสอนแทน</button>
  <button class="tab-btn" onclick="switchTab('records')">บันทึกวันนี้</button>
  <button class="tab-btn" onclick="switchTab('timetable')">ตารางสอน</button>
</div>

<!-- Tab 1: Assign -->
<div class="tab-pane active" id="tab-assign">
  <div id="api-warn" class="cfg-alert" style="display:none">
    <strong>⚠ ยังไม่ได้ตั้งค่า API URL</strong>
    แก้ไข <code>API_URL</code> ในไฟล์ index.html
  </div>

  <div class="card">
    <div class="card-title">เลือกครูที่ลา</div>
    <label class="field-label">วันที่</label>
    <input type="date" id="date-input" onchange="onDateChange()">

    <label class="field-label">ครูที่ลา (เลือกได้หลายคน)</label>
    <div id="teacher-checklist"></div>
    <div id="selected-summary">ยังไม่ได้เลือกครู</div>

  </div>

  <div id="periods-container"></div>
  <button class="btn-submit" id="submit-btn" onclick="submitAll()" style="display:none">บันทึกการจัดสอนแทน</button>
</div>

<!-- หน้าสรุป (แสดงหลัง submit สำเร็จ) -->
<div id="summary-view" style="display:none;padding:14px;max-width:600px;margin:0 auto">
  <div id="summary-header" style="background:#fff;border-radius:12px;padding:14px 16px;margin-bottom:10px;box-shadow:0 1px 4px rgba(0,0,0,.08)">
    <div style="font-size:.75rem;font-weight:700;color:var(--gray);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px">สรุปการจัดสอนแทน</div>
    <div id="summary-date-label" style="font-size:1rem;font-weight:700;color:var(--blue-dk)"></div>
  </div>
  <div id="summary-content"></div>
  <div style="display:flex;gap:8px;margin-top:4px">
    <button class="btn-line" onclick="copyFromSummary()" style="flex:1">📋 คัดลอกสำหรับ LINE</button>
    <button class="btn-refresh" onclick="resetAssign()" style="flex:1;padding:10px">➕ จัดสอนแทนเพิ่มเติม</button>
  </div>
</div>

<!-- Tab 2: Records -->
<div class="tab-pane" id="tab-records">
  <div class="rec-toolbar">
    <h3 id="rec-title">รายการวันนี้</h3>
    <button class="btn-line" id="btn-line" onclick="copyForLine()" style="display:none">📋 คัดลอกสำหรับ LINE</button>
    <button class="btn-refresh" onclick="loadRecords()">↻ รีเฟรช</button>
  </div>
  <div id="records-list">
    <div class="empty-msg"><div class="icon">📋</div><p>กด รีเฟรช เพื่อดูข้อมูล</p></div>
  </div>
</div>

<!-- Tab 3: Timetable -->
<div class="tab-pane" id="tab-timetable">
  <div class="day-sel" id="day-sel"></div>
  <div class="tt-wrap">
    <table class="tt" id="tt-grid">
      <tr><td colspan="8" style="text-align:center;padding:24px;color:var(--gray)">กำลังโหลด...</td></tr>
    </table>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ══════════════════════════════════════════════════════════════
const API_URL = 'https://script.google.com/macros/s/AKfycbyf-T_GRggQC2Ba2zpHEcikS057blfXAh_asBNKYn6n2E2vTsqxLIhM-Y4v4-W0FtnKJg/exec';
// ══════════════════════════════════════════════════════════════

const DAYS_TH = ['อาทิตย์','จันทร์','อังคาร','พุธ','พฤหัส','ศุกร์','เสาร์'];
const TT_DAYS = ['จันทร์','อังคาร','พุธ','พฤหัส','ศุกร์'];
const TT_PERIODS = [
  {p:1,t:'08:30'},{p:2,t:'09:30'},{p:3,t:'10:30'},
  {p:4,t:'12:30'},{p:5,t:'13:30'},{p:6,t:'14:30'},{p:7,t:'15:30'}
];

let TEACHERS = TEACHERS_DATA;  // ข้อมูลฝังตรงนี้ ไม่ต้อง fetch
let currentDate = '';
let currentDay  = '';
let _lastRecords = [];
let _ttDay = '';

// ─── Init ───────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
  if (API_URL.includes('YOUR_APPS_SCRIPT')) {
    document.getElementById('api-warn').style.display = 'block';
  }

  const today = new Date();
  const pad = n => String(n).padStart(2,'0');
  currentDate = `${today.getFullYear()}-${pad(today.getMonth()+1)}-${pad(today.getDate())}`;
  document.getElementById('date-input').value = currentDate;
  currentDay = DAYS_TH[today.getDay()];

  buildChecklist();
  initTimetable();
});

// ─── Helpers ────────────────────────────────────────────────────
function sn(t) {
  return t.name || '';
}

function getChecked() {
  return [...document.querySelectorAll('#teacher-checklist input:checked')].map(el => el.value);
}

function getAvailableTeachers(day, period, excludeNames) {
  const excl = Array.isArray(excludeNames) ? excludeNames : [excludeNames];
  const busy = new Set();
  TEACHERS.forEach(t => {
    if ((t.schedule[day] || []).some(p => p.period === period)) busy.add(t.name);
  });
  return TEACHERS
    .filter(t =>
      Object.keys(t.schedule).length > 0 &&
      !excl.includes(t.name) &&
      !busy.has(t.name)
    )
    .map(t => ({ name: t.name, short: sn(t) }));
}

function getPairLabel(p, absentName) {
  if (!p.isDouble) return String(p.period);
  const absent = TEACHERS.find(t => t.name === absentName);
  const pairs = (absent?.schedule?.[currentDay] || [])
    .filter(x => x.isDouble && x.time === p.time && x.class === p.class)
    .map(x => x.period);
  return pairs.length > 1 ? `${Math.min(...pairs)}+${Math.max(...pairs)}` : String(p.period);
}

// ─── Build teacher checklist ─────────────────────────────────────
function buildChecklist() {
  const wrap = document.getElementById('teacher-checklist');
  wrap.innerHTML = '';
  const active = TEACHERS.filter(t => Object.keys(t.schedule).some(d => (t.schedule[d]||[]).length > 0));
  active.forEach(t => {
    const lbl = document.createElement('label');
    const cb  = document.createElement('input');
    cb.type  = 'checkbox';
    cb.value = t.name;
    cb.addEventListener('change', () => {
      lbl.classList.toggle('selected', cb.checked);
      onTeachersChange();
    });
    lbl.appendChild(cb);
    const span = document.createElement('span');
    span.textContent = sn(t);
    lbl.appendChild(span);
    wrap.appendChild(lbl);
  });
}

// ─── Date change ─────────────────────────────────────────────────
function onDateChange() {
  currentDate = document.getElementById('date-input').value;
  currentDay  = DAYS_TH[new Date(currentDate + 'T12:00:00').getDay()];
  onTeachersChange();
}

// ─── Teachers checkbox change ─────────────────────────────────────
function onTeachersChange() {
  const checked = getChecked();
  const sumEl   = document.getElementById('selected-summary');
  const cont    = document.getElementById('periods-container');
  const submitBtn = document.getElementById('submit-btn');

  if (checked.length === 0) {
    sumEl.textContent = 'ยังไม่ได้เลือกครู';
    cont.innerHTML    = '';
    submitBtn.style.display = 'none';
    return;
  }

  sumEl.textContent = `เลือกแล้ว ${checked.length} คน: ${checked.map(n => {
    const t = TEACHERS.find(x => x.name === n);
    return t ? sn(t) : n;
  }).join(', ')}`;

  cont.innerHTML = '';
  let totalCards = 0;

  checked.forEach(absentName => {
    const teacher = TEACHERS.find(t => t.name === absentName);
    const periods = (teacher?.schedule?.[currentDay] || []).slice().sort((a,b)=>a.period-b.period);

    const hdr = document.createElement('div');
    hdr.className = 'group-hdr';
    hdr.textContent = `👤 ${teacher ? sn(teacher) : absentName}`;
    cont.appendChild(hdr);

    if (periods.length === 0) {
      const msg = document.createElement('p');
      msg.style.cssText = 'font-size:.8rem;color:var(--gray);padding:6px 4px 10px;';
      msg.textContent = `ไม่มีคาบเรียนวัน${currentDay || 'นี้'}`;
      cont.appendChild(msg);
      return;
    }

    // แสดงทุกคาบแยกกัน (รายชั่วโมง)
    periods.forEach(p => {
      renderPeriodCard(cont, p, absentName, checked);
      totalCards++;
    });
  });

  submitBtn.style.display = totalCards > 0 ? 'block' : 'none';
}

// ─── Period card ──────────────────────────────────────────────────
function renderPeriodCard(cont, p, absentName, allAbsent) {
  const available = getAvailableTeachers(currentDay, p.period, allAbsent);

  const card = document.createElement('div');
  card.className = 'period-card';
  card.dataset.absentName = absentName;
  card.dataset.period  = String(p.period);
  card.dataset.time    = p.time;
  card.dataset.cls     = p.class;
  card.dataset.subject = p.subject;
  card.dataset.room    = p.room;

  card.innerHTML = `
    <div class="p-header">
      <span class="p-badge${p.isDouble?' double':''}">คาบ ${p.period}${p.isDouble?' ✦':''}</span>
      <div class="p-info">
        <div class="p-class">${p.class}</div>
        <div class="p-subj">${p.subject}</div>
        <div class="p-time">🕐 ${p.time}</div>
      </div>
      <span class="p-room">ห้อง ${p.room}</span>
    </div>
    <span class="sub-lbl">ครูสอนแทน</span>
    <select class="sub-sel" onchange="onSubChange(this)">
      <option value="">— เลือกครูสอนแทน (${available.length} คนว่าง) —</option>
      ${available.map(a=>`<option value="${a.name}">${a.name}</option>`).join('')}
      <optgroup label="──────────────────"></optgroup>
      <option value="__all__">แสดงครูทั้งหมด...</option>
    </select>
    <div class="sub-note"></div>
  `;
  cont.appendChild(card);
}

// ─── Substitute select change ─────────────────────────────────────
function onSubChange(sel) {
  const card      = sel.closest('.period-card');
  const absentName = card.dataset.absentName;
  const allAbsent = getChecked();
  const period    = parseInt(card.dataset.period.split('+')[0]);

  if (sel.value === '__all__') {
    const avail = getAvailableTeachers(currentDay, period, allAbsent);
    const allActive = TEACHERS.filter(t =>
      Object.keys(t.schedule).length > 0 && !allAbsent.includes(t.name)
    );
    const busy = allActive.filter(t => !avail.find(a => a.name === t.name));
    sel.innerHTML = `
      <option value="">— เลือกครูสอนแทน —</option>
      <optgroup label="ว่าง (${avail.length} คน)">
        ${avail.map(a=>`<option value="${a.name}">${a.short}</option>`).join('')}
      </optgroup>
      <optgroup label="มีคาบอยู่ (${busy.length} คน)">
        ${busy.map(t=>`<option value="${t.name}">${sn(t)}</option>`).join('')}
      </optgroup>`;
    sel.value = '';
    return;
  }

  const note = card.querySelector('.sub-note');
  if (sel.value) {
    sel.classList.add('done');
    card.classList.add('assigned');
    const t = TEACHERS.find(x => x.name === sel.value);
    note.textContent = `✓ ${t ? sn(t) : sel.value} รับหน้าที่แทน`;
  } else {
    sel.classList.remove('done');
    card.classList.remove('assigned');
    note.textContent = '';
  }
}

// ─── Submit ───────────────────────────────────────────────────────
async function submitAll() {
  if (API_URL.includes('YOUR_APPS_SCRIPT')) {
    showToast('กรุณาตั้งค่า API URL ก่อน', 'red'); return;
  }
  const toSave = [];

  document.querySelectorAll('.period-card').forEach(card => {
    const val = card.querySelector('.sub-sel')?.value;
    if (val && val !== '__all__') {
      toSave.push({
        absentName: card.dataset.absentName,
        period:     card.dataset.period,
        time:       card.dataset.time,
        cls:        card.dataset.cls,
        subject:    card.dataset.subject,
        room:       card.dataset.room,
        substitute: val
      });
    }
  });

  if (toSave.length === 0) {
    showToast('กรุณาเลือกครูสอนแทนอย่างน้อย 1 คาบ', 'red'); return;
  }

  const btn = document.getElementById('submit-btn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>กำลังบันทึก...';

  let ok = 0;
  for (const item of toSave) {
    try {
      const res = await fetch(API_URL, {
        method: 'POST',
        body: JSON.stringify({
          action: 'logSubstitute',
          date: currentDate,
          absentTeacher: item.absentName,
          period: item.period,
          time: item.time,
          cls: item.cls,
          subject: item.subject,
          room: item.room,
          substitute: item.substitute
        })
      });
      const data = await res.json();
      if (data.success) ok++;
    } catch(e) { /* continue */ }
  }

  btn.disabled = false;
  btn.innerHTML = 'บันทึกการจัดสอนแทน';

  if (ok > 0) {
    showSummary(toSave);
  } else {
    showToast('บันทึกไม่สำเร็จ ตรวจสอบการเชื่อมต่อ', 'red');
  }
}

// ─── Show summary after submit ─────────────────────────────────────
let _lastSubmission = [];

function showSummary(items) {
  _lastSubmission = items;

  // สร้าง label วันที่ภาษาไทย
  const dateObj = new Date(currentDate + 'T12:00:00');
  const dayTh   = DAYS_TH[dateObj.getDay()];
  const months  = ['','ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
  const [y, m, d] = currentDate.split('-');
  const dateStr = `วัน${dayTh}ที่ ${parseInt(d)} ${months[parseInt(m)]} ${parseInt(y)+543}`;
  document.getElementById('summary-date-label').textContent = dateStr;

  // จัดกลุ่มตามครูที่ลา
  const groups = {};
  items.forEach(item => {
    if (!groups[item.absentName]) groups[item.absentName] = [];
    groups[item.absentName].push(item);
  });

  const cont = document.getElementById('summary-content');
  cont.innerHTML = Object.entries(groups).map(([absent, rows]) => {
    const rowsHtml = rows
      .sort((a,b) => parseInt(a.period) - parseInt(b.period))
      .map(r => {
        const isDouble = r.subject && (
          rows.filter(x => x.time === r.time && x.cls === r.cls).length > 1
        );
        return `<div class="sum-row">
          <span class="sum-period${isDouble?' double':''}">คาบ ${r.period}</span>
          <div class="sum-mid">
            <div class="sum-time">🕐 ${r.time}</div>
            <div class="sum-cls">${r.cls} · ห้อง ${r.room}</div>
            <div class="sum-subj">${r.subject}</div>
          </div>
          <span class="sum-arrow">สอนแทนโดย →</span>
          <div class="sum-sub">${r.substitute}</div>
        </div>`;
      }).join('');

    return `<div class="sum-group">
      <div class="sum-group-hdr">👤 ${absent} ลา</div>
      ${rowsHtml}
    </div>`;
  }).join('');

  // ซ่อน assign form / แสดง summary
  document.getElementById('tab-assign').style.display  = 'none';
  document.getElementById('summary-view').style.display = 'block';
}

function resetAssign() {
  // ซ่อน summary / แสดง assign form
  document.getElementById('summary-view').style.display = 'none';
  document.getElementById('tab-assign').style.display  = 'block';

  // ล้างฟอร์ม
  document.querySelectorAll('#teacher-checklist input').forEach(cb => {
    if (cb.checked) { cb.checked = false; cb.closest('label')?.classList.remove('selected'); }
  });
  document.getElementById('selected-summary').textContent = 'ยังไม่ได้เลือกครู';
  document.getElementById('periods-container').innerHTML = '';
  document.getElementById('submit-btn').style.display = 'none';
}

function copyFromSummary() {
  if (!_lastSubmission.length) return;
  const dateLabel = document.getElementById('summary-date-label').textContent;

  const groups = {};
  _lastSubmission.forEach(item => {
    if (!groups[item.absentName]) groups[item.absentName] = [];
    groups[item.absentName].push(item);
  });

  const lines = [
    `📋 จัดสอนแทน ${dateLabel}`,
    `โรงเรียนเมืองแกพิทยาสรรค์`,
    `────────────────────`,
    ...Object.entries(groups).flatMap(([absent, rows]) => [
      `👤 ${absent} ลา`,
      ...rows
        .sort((a,b) => parseInt(a.period) - parseInt(b.period))
        .map(r => `  คาบ ${r.period} (${r.time}) ${r.cls} ${r.subject}\n  → ${r.substitute}`)
    ])
  ];

  navigator.clipboard.writeText(lines.join('\n'))
    .then(() => showToast('คัดลอกแล้ว ✓ วางใน LINE ได้เลย', 'green'))
    .catch(() => showToast('คัดลอกไม่สำเร็จ', 'red'));
}

// ─── Records tab ──────────────────────────────────────────────────
async function loadRecords() {
  document.getElementById('rec-title').textContent = `รายการ ${currentDate}`;
  const list = document.getElementById('records-list');
  list.innerHTML = '<div style="text-align:center;padding:20px"><span class="spinner"></span>กำลังโหลด...</div>';

  if (API_URL.includes('YOUR_APPS_SCRIPT')) {
    list.innerHTML = '<div class="empty-msg"><div class="icon">⚠</div><p>ยังไม่ได้ตั้งค่า API URL</p></div>';
    return;
  }
  try {
    const res  = await fetch(`${API_URL}?action=getByDate&date=${currentDate}`);
    const data = await res.json();
    renderRecords(data.records || []);
  } catch(e) {
    list.innerHTML = '<div class="empty-msg"><div class="icon">❌</div><p>เชื่อมต่อไม่ได้</p></div>';
  }
}

function renderRecords(records) {
  _lastRecords = records;
  const list    = document.getElementById('records-list');
  const lineBtn = document.getElementById('btn-line');

  if (records.length === 0) {
    list.innerHTML = '<div class="empty-msg"><div class="icon">📋</div><p>ยังไม่มีรายการวันนี้</p></div>';
    lineBtn.style.display = 'none';
    return;
  }
  lineBtn.style.display = '';

  const rows = records.map(r => {
    const dbl = r.period.includes('+');
    // แสดงชื่อสั้นจาก TEACHERS ถ้าหาได้
    const tAbsent = TEACHERS.find(t => t.name === r.absentTeacher);
    const tSub    = TEACHERS.find(t => t.name === r.substitute);
    const snAbsent = tAbsent ? sn(tAbsent) : r.absentTeacher.replace(/^(นาย|นางสาว|นาง)\s*/,'');
    const snSub    = tSub    ? sn(tSub)    : r.substitute.replace(/^(นาย|นางสาว|นาง)\s*/,'');
    return `<tr>
      <td class="td-period${dbl?' double':''}">คาบ<br>${r.period}</td>
      <td>
        <div class="td-time">${r.time}</div>
        <div class="td-cls">${r.cls} · ${r.subject} · ห้อง ${r.room}</div>
      </td>
      <td>
        <div class="td-absent">⬆ ${snAbsent} ลา</div>
        <div style="font-size:.75rem;color:var(--gray)">↓</div>
        <div class="td-sub">${snSub} สอนแทน</div>
      </td>
      <td class="del-wrap">
        <button class="btn-del" onclick="deleteRecord(${r.rowIndex})" title="ลบ">✕</button>
      </td>
    </tr>`;
  }).join('');

  list.innerHTML = `<table class="sum-table">
    <thead><tr><th>คาบ</th><th>เวลา / ชั้น</th><th>ครูที่ลา → สอนแทน</th><th></th></tr></thead>
    <tbody>${rows}</tbody>
  </table>`;
}

function copyForLine() {
  if (!_lastRecords.length) return;
  const dateObj = new Date(currentDate + 'T00:00:00');
  const dayTh   = DAYS_TH[dateObj.getDay()];
  const months  = ['','ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
  const [y, m, d] = currentDate.split('-');
  const dateStr   = `วัน${dayTh}ที่ ${parseInt(d)} ${months[parseInt(m)]} ${parseInt(y)+543}`;

  const lines = [
    `📋 จัดสอนแทน ${dateStr}`,
    `โรงเรียนเมืองแกพิทยาสรรค์`,
    `───────────────────`,
    ..._lastRecords.map(r => {
      const tA = TEACHERS.find(t => t.name === r.absentTeacher);
      const tS = TEACHERS.find(t => t.name === r.substitute);
      const snA = tA ? sn(tA) : r.absentTeacher.replace(/^(นาย|นางสาว|นาง)\s*/,'');
      const snS = tS ? sn(tS) : r.substitute.replace(/^(นาย|นางสาว|นาง)\s*/,'');
      return `คาบ ${r.period} (${r.time})\n${snA} ลา → ${snS} สอนแทน\n${r.cls} · ${r.subject} · ห้อง ${r.room}`;
    })
  ];

  navigator.clipboard.writeText(lines.join('\n\n'))
    .then(() => showToast('คัดลอกแล้ว ✓ วางใน LINE ได้เลย', 'green'))
    .catch(() => showToast('คัดลอกไม่สำเร็จ', 'red'));
}

async function deleteRecord(rowIndex) {
  if (!confirm('ลบรายการนี้?')) return;
  try {
    await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'deleteRecord', rowIndex }) });
    showToast('ลบแล้ว', 'green');
    loadRecords();
  } catch(e) { showToast('ลบไม่สำเร็จ', 'red'); }
}

// ─── Tabs ─────────────────────────────────────────────────────────
function switchTab(tab) {
  const map = ['assign','records','timetable'];
  document.querySelectorAll('.tab-btn').forEach((b,i) => b.classList.toggle('active', map[i] === tab));
  document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
  document.getElementById(`tab-${tab}`).classList.add('active');
  if (tab === 'records')   loadRecords();
  if (tab === 'timetable') renderTimetable();
}

// ─── Timetable ────────────────────────────────────────────────────
function initTimetable() {
  _ttDay = TT_DAYS.includes(currentDay) ? currentDay : 'จันทร์';
  const sel = document.getElementById('day-sel');
  TT_DAYS.forEach(d => {
    const btn = document.createElement('button');
    btn.className = 'day-btn' + (d === _ttDay ? ' active' : '');
    btn.textContent = d;
    btn.onclick = () => {
      _ttDay = d;
      document.querySelectorAll('.day-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderTimetable();
    };
    sel.appendChild(btn);
  });
}

function renderTimetable() {
  if (!TEACHERS.length) return;
  const grid = document.getElementById('tt-grid');
  const header = `<tr>
    <th style="text-align:left;padding-left:10px">ครู</th>
    ${TT_PERIODS.map(pi => `<th>คาบ ${pi.p}<span class="tt-t">${pi.t}</span></th>`).join('')}
  </tr>`;

  const active = TEACHERS.filter(t => Object.keys(t.schedule).some(d => (t.schedule[d]||[]).length > 0));
  const rows = active.map(t => {
    const sched = t.schedule[_ttDay] || [];
    const cells = TT_PERIODS.map(pi => {
      const e = sched.find(x => x.period === pi.p);
      if (!e) return `<td class="c-free">ว่าง</td>`;
      return `<td class="c-busy${e.isDouble?' c-double':''}">
        <div class="c-cls">${e.class}</div>
        <div class="c-subj">${e.subject.split(' ')[0]}</div>
      </td>`;
    }).join('');
    return `<tr><td class="td-n">${sn(t)}</td>${cells}</tr>`;
  }).join('');

  grid.innerHTML = header + rows;
}

// ─── Toast ────────────────────────────────────────────────────────
function showToast(msg, type='') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `toast show ${type}`;
  setTimeout(() => t.className = 'toast', 2500);
}
</script>
